<!DOCTYPE html>
<html>
<head>
    <title>InvestingTracker</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles/global.css">
</head>
<body>

    <div class="container">

        <div class="login-box">

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">

                <h1 id="pageTitle" style="margin: 0;">
                    Trade
                </h1>

                <button
                    type="button"
                    onclick="window.history.back()"
                    style="
                        background: none;
                        border: none;
                        cursor: pointer;
                        font-size: 24px;
                        padding: 0;
                    "
                    title="Fortryd"
                >
                    🗑️
                </button>

            </div>

            <form id="tradeForm">

                <input
                    type="date"
                    id="date"
                    class="customControl"
                    required
                >

                <input
                    type="number"
                    id="buySellType"
                    class="customControl"
                    placeholder="Buy/Sell Type..."
                    required
                >

                <input
                    type="number"
                    id="numberOfShares"
                    class="customControl"
                    placeholder="Antal aktier..."
                    required
                >

                <input
                    type="number"
                    step="0.01"
                    id="sharePrice"
                    class="customControl"
                    placeholder="Pris..."
                    required
                >

                <input
                    type="number"
                    step="0.01"
                    id="costs"
                    class="customControl"
                    placeholder="Omkostninger..."
                    required
                >

                <button
                    type="submit"
                    class="customControl"
                    id="submitButton"
                >
                    Gem
                </button>

                <div
                    class="message"
                    id="message"
                ></div>

            </form>

        </div>

    </div>

    <script
        type="module"
        src="javascripts/tradeForm.js"
    ></script>

</body>
</html>
