<!DOCTYPE html>
<html>
<head>
<title>InvestingTracker</title>

<link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="styles/tickerList.css">


</head>
<body>



  <div class="container">
<h1>InvestingTracker</h1>
<p id="ko">This is a paragraph.</p>

    <input
      type="text"
      id="soegefelt"
      class="soegefelt"
      placeholder="Søg efter navn..."
    />

    <div id="liste" class="liste"/>
  </div>
<script type="module" src="javascripts/tickerList.js"></script>
    
    <script type="module">
  try {
    alert("test1");
    const response = await fetch("https://investingtracker.onrender.com/ticker/AAPL");
    alert("test2");

    const data = await response.text();
    alert("test3");

    document.getElementById("ko").textContent = data;
    alert("test4");
  } catch (error) {
    console.error(error);
    alert("Fejl: " + error.message);
  }
    </script>

</body>
</html>
