<!DOCTYPE html>
<html>

<head>
    <title>InvestingTracker</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles/global.css">

</head>

<body>

    <div class="container">
        <div id="titleContainer">


        </div>

        <form id="optionForm">

            <div id="accountIdContainer">
                <div class="customLabel">Konto</div>
                <select id="accountId" class="customControl">
                </select>
            </div>

            <div>
                <div class="customLabel">Dato</div>
                <input type="date" id="date" class="customControl" placeholder="dd-mm-yyyy" required>
            </div>

            <div>
                <div class="customLabel">Købs-/salgsoption</div>
                <select id="callPutType" class="customControl" required>
                    <option value="0">Købsoption</option>
                    <option value="1">Salgsoption</option>
                </select>
            </div>

            <div>
                <div class="customLabel">Køb/salg</div>
                <select id="longShortType" class="customControl" required>
                    <option value="0">Køb</option>
                    <option value="1">Salg</option>
                </select>
            </div>

            <div>
                <div class="customLabel">Antal kontrakter</div>
                <input type="number" id="numberOfContracts" class="customControl" required>
            </div>

            <div>
                <div class="customLabel">Antal aktier per kontrakt</div>
                <input type="number" id="numberOfSharesPerContract" class="customControl" required>
            </div>

            <div>
                <div class="customLabel">Premium</div>
                <input type="number" step="0.01" id="premiumPrice" class="customControl" required>
            </div>

            <div>
                <div class="customLabel">Strike</div>
                <input type="number" step="0.01" id="strikePrice" class="customControl" required>
            </div>

            <div>
                <div class="customLabel">Udløbsdato</div>
                <input type="date" id="expireDate" class="customControl" placeholder="dd-mm-yyyy" required>
            </div>

            <div>
                <div class="customLabel">Omkostninger</div>
                <input type="number" step="0.01" id="costs" class="customControl" required>
            </div>

            <div>
                <div class="customLabel">Kurs for omkostninger</div>
                <div>
                    <input type="number" step="0.01" id="costsExchangeRate" class="customControl" required>
                </div>
            </div>

            <div>
                <div class="customLabel">Udnyttet</div>
                <input type="checkbox" id="isExercised" class="customCheckbox">
            </div>

            <div id="ExercisedContainer" class="displayNone">
                <div>
                    <div class="customLabel">Udnyttelsesdato</div>
                    <input type="date" id="exerciseDate" class="customControl" placeholder="dd-mm-yyyy">
                </div>

                <div>
                    <div class="customLabel">Udnyttelsesomkostninger</div>
                    <input type="number" step="0.01" id="exerciseCosts" class="customControl">
                </div>
            </div>

            <button type="submit" class="customControl" id="submitButton">
                Gem
            </button>

            <div class="message" id="message"></div>

        </form>
    </div>



    <script type="module" src="javascripts/option.js"></script>


</body>

</html>
